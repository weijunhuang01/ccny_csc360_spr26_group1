syntax = "proto3";
package week09shard;

service ShardNode {
  rpc Apply(ApplyRequest) returns (ApplyResponse);
  rpc Read(ReadRequest) returns (ReadResponse);
  rpc GetShardDump(GetShardDumpRequest) returns (GetShardDumpResponse);
  rpc LoadShardDump(LoadShardDumpRequest) returns (LoadShardDumpResponse);
  rpc DropShard(DropShardRequest) returns (DropShardResponse);
  rpc Status(StatusRequest) returns (StatusResponse);
}

message ApplyRequest {
  int32 logical_shard_id = 1;
  string operation = 2;
  string payload_json = 3;
}

message ApplyResponse {
  bool ok = 1;
  string result_json = 2;
  string error = 3;
}

message ReadRequest {
  int32 logical_shard_id = 1;
  string query = 2;
  string payload_json = 3;
}

message ReadResponse {
  bool ok = 1;
  string result_json = 2;
  string error = 3;
}

message GetShardDumpRequest {
  int32 logical_shard_id = 1;
}

message GetShardDumpResponse {
  bool ok = 1;
  string dump_json = 2;
  string error = 3;
}

message LoadShardDumpRequest {
  int32 logical_shard_id = 1;
  string dump_json = 2;
}

message LoadShardDumpResponse {
  bool ok = 1;
  string error = 2;
}

message DropShardRequest {
  int32 logical_shard_id = 1;
}

message DropShardResponse {
  bool ok = 1;
  string error = 2;
}

message StatusRequest {}

message LogicalShardInfo {
  int32 logical_shard_id = 1;
  uint64 record_count = 2;
}

message StatusResponse {
  int32 node_id = 1;
  string addr = 2;
  repeated LogicalShardInfo logical_shards = 3;
}
